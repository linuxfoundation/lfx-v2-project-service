---
apiVersion: heimdall.dadrus.github.com/v1alpha4
kind: RuleSet
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  rules:
    - id: "rule:lfx:lfx-v2-project-service:openapi:get"
      allow_encoded_slashes: "off"
      match:
        methods:
          - GET
        routes:
          - path: /_projects/openapi.json
          - path: /_projects/openapi.yaml
          - path: /_projects/openapi3.json
          - path: /_projects/openapi3.yaml
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        - authorizer: allow_all
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}
    - id: "rule:lfx:lfx-v2-project-service:projects:create"
      allow_encoded_slashes: "off"
      match:
        methods:
          - POST
        routes:
          - path: /projects
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: json_content_type
        - authorizer: openfga_check
          config:
            values:
              relation: writer
              object: "project:{{ "{{- .Request.Body.parent_uid -}}" }}"
        {{- else }}
        {{/*
          When OpenFGA is disabled, allow all requests
          (Only meant for *local development* because OpenFGA should be enabled when deployed)
        */}}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-project-service:projects:list"
      allow_encoded_slashes: "off"
      match:
        methods:
          - GET
        routes:
          - path: /projects
      execute:
        - authenticator: oidc
        - authenticator: anonymous_authenticator
        {{- if .Values.app.use_oidc_contextualizer }}
        - contextualizer: oidc_contextualizer
        {{- end }}
        {{- if .Values.openfga.enabled }}
        - authorizer: deny_all
        {{- else }}
        - authorizer: allow_all
        {{- end }}
        - finalizer: create_jwt
          config:
            values:
              aud: {{ .Values.app.audience }}

    - id: "rule:lfx:lfx-v2-project-service:projects:project:get"
