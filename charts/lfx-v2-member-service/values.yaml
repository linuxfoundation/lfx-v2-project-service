---
# image is the configuration for the container images
image:
  # repository is the container image repository
  repository: ghcr.io/linuxfoundation/lfx-v2-member-service/member-api
  # tag is the container image tag (overrides appVersion from Chart.yaml)
  tag: ""
  # pullPolicy is the image pull policy
  pullPolicy: IfNotPresent

# replicaCount is the number of replicas for the deployment
replicaCount: 3

# resources is the configuration for container resource limits and requests
resources:
  # limits is the maximum amount of resources the container can use
  limits:
    cpu: 500m
    memory: 512Mi
  # requests is the amount of resources the container requests
  requests:
    cpu: 100m
    memory: 128Mi

# app is the configuration for the application
app:
  # logLevel is the log level (debug, info, warn, error)
  logLevel: info
  # logAddSource is a boolean to determine if the log source should be added
  logAddSource: true
  # audience is the JWT audience required for authentication with this app
  audience: lfx-v2-member-service
  # jwtAuthDisabledMockLocalPrincipal mocks auth for local development to use a set principal
  # (only use for local development)
  jwtAuthDisabledMockLocalPrincipal: ""
  # use_oidc_contextualizer is a boolean to determine if the OIDC contextualizer should be used
  use_oidc_contextualizer: true
  # globalOrgAdminTeamUID is the v2 UID of the platform org-admin team
  # whose members (EasyCLA / LFX Enrollment client-IDs) are authorized to
  # call POST /b2b_orgs and POST /admin/reindex. The placeholder _null
  # never matches a real team UID; override per-environment.
  globalOrgAdminTeamUID: "_null"
  # extraEnv is a list of additional environment variables to set in the container.
  # Supports both simple key-value pairs and Kubernetes field references.
  extraEnv: []
  # otel is the configuration for OpenTelemetry tracing
  otel:
    # serviceName is the service name for OpenTelemetry resource identification
    # (default: "lfx-v2-member-service")
    serviceName: ""
    # serviceVersion is the service version for OpenTelemetry resource identification
    # (default: "1.0.0")
    serviceVersion: ""
    # protocol specifies the OTLP protocol: "grpc" or "http"
    # (default: "grpc")
    protocol: "grpc"
    # endpoint is the OTLP collector endpoint
    # For gRPC: typically "host:4317", for HTTP: typically "host:4318"
    endpoint: ""
    # insecure disables TLS for the OTLP connection
    # Set to "true" for in-cluster communication without TLS
    insecure: "false"
    # tracesExporter specifies the traces exporter: "otlp" or "none"
    # (default: "none")
    tracesExporter: "none"
    # tracesSampleRatio specifies the sampling ratio for traces (0.0 to 1.0)
    # A value of 1.0 means all traces are sampled, 0.5 means 50% are sampled
    # (default: "1.0")
    tracesSampleRatio: "1.0"
    # metricsExporter specifies the metrics exporter: "otlp" or "none"
    # (default: "none")
    metricsExporter: "none"
    # logsExporter specifies the logs exporter: "otlp" or "none"
    # (default: "none")
    logsExporter: "none"
    # propagators specifies the propagators to use, comma-separated
    # Supported values: "tracecontext", "baggage", "jaeger"
    # (default: "tracecontext,baggage")
    propagators: "tracecontext,baggage,jaeger"

# traefik is the configuration for Traefik Gateway API routing
traefik:
  # gateway specifies the platform Gateway to attach to
  gateway:
    name: lfx-platform-gateway
    namespace: lfx

# lfx is the configuration for LFX platform
lfx:
  # domain is the base domain for routing
  domain: k8s.orb.local
  # namespace is the target namespace for deployment
  namespace: lfx

# service is the configuration for the Kubernetes service
service:
  # port is the service port
  port: 8080

# nats is the configuration for the NATS server
nats:
  # url is the URL of the NATS server
  url: nats://lfx-platform-nats.lfx.svc.cluster.local:4222

  # kv_bucket_cache is the configuration for the single membership-cache KV bucket.
  # All cached records (tiers, memberships, key contacts, project ID mappings) are
  # stored here with namespaced key prefixes to avoid collisions. The bucket-level
  # TTL enforces hard eviction; per-item soft TTLs (6h stale, 23h expire) are
  # written into each entry's CachedValue envelope by the service.
  kv_bucket_cache:
    # creation is a boolean to determine if the KV bucket should be created via the helm chart.
    # set it to false if you want to use an existing KV bucket.
    creation: true
    # keep is a boolean to determine if the KV bucket should be preserved during helm uninstall
    # set it to false if you want the bucket to be deleted when the chart is uninstalled
    keep: true
    # name is the name of the KV bucket
    name: membership-cache
    # replicas is the number of replicas for the KV bucket
    replicas: 1
    # history is the number of historical values to keep per key
    history: 1
    # storage is the storage type for the KV bucket
    storage: file
    # maxValueSize is the maximum size of a value in the KV bucket
    maxValueSize: 10485760 # 10MB
    # maxBytes is the maximum total size of the KV bucket
    maxBytes: 1073741824 # 1GB
    # compression is a boolean to determine if the KV bucket should be compressed
    compression: true
    # ttl is the bucket-level hard eviction TTL for all entries
    ttl: 24h

  # kv_bucket_sobject_cache is the configuration for the member-service-cache KV
  # bucket. It stores raw Salesforce sObject REST API responses alongside their
  # ETag / Last-Modified metadata so the service can issue HTTP conditional GETs
  # (If-None-Match / If-Modified-Since) on subsequent fetches. Keys follow the
  # "{sobject_type}.{uid}" pattern. Unlike membership-cache this bucket does NOT
  # use soft-TTL envelopes — freshness is handled entirely by HTTP conditional
  # GET semantics. Entries are re-written (resetting the TTL) on every successful
  # 304 revalidation, so a 7-day TTL acts as a backstop for records that are
  # never modified and become quiet.
  kv_bucket_sobject_cache:
    # creation is a boolean to determine if the KV bucket should be created via the helm chart.
    # set it to false if you want to use an existing KV bucket.
    creation: true
    # keep is a boolean to determine if the KV bucket should be preserved during helm uninstall
    # set it to false if you want the bucket to be deleted when the chart is uninstalled
    keep: true
    # name is the name of the KV bucket
    name: member-service-cache
    # replicas is the number of replicas for the KV bucket
    replicas: 1
    # history is the number of historical values to keep per key
    history: 1
    # storage is the storage type for the KV bucket
    storage: file
    # maxValueSize is the maximum size of a value in the KV bucket (10 MB)
    maxValueSize: 10485760
    # maxBytes is the maximum total size of the KV bucket (1 GB)
    maxBytes: 1073741824
    # compression enables NATS JetStream compression for stored values
    compression: true
    # ttl is the bucket-level hard eviction TTL for all entries (7 days)
    ttl: 168h

# openfga is the configuration for the OpenFGA server
openfga:
  # enabled is a boolean to determine if the OpenFGA server should be enabled for authorization
  # Note: If it is disabled, then the member service will allow all requests.
  # (Disabling OpenFGA should only be used for local development.)
  enabled: true

# heimdall is the configuration for the heimdall middleware
heimdall:
  enabled: true
  url: http://lfx-platform-heimdall.lfx.svc.cluster.local:4456
  # jwksUrl is the JWKS URL for JWT verification (note: uses port 4457)
  jwksUrl: http://lfx-platform-heimdall.lfx.svc.cluster.local:4457/.well-known/jwks
  add_middleware: false

# global is the configuration for the global settings
global:
  # awsRegion is the AWS region for the External Secrets Operator
  awsRegion: us-west-2

# serviceAccount is the configuration for the Kubernetes service account
serviceAccount:
  # create specifies whether a service account should be created
  create: true
  # name is the name of the service account to use.
  # If not set and create is true, a name is generated using the chart name
  name: "lfx-v2-member-service"
  # annotations to add to the service account (e.g. for IRSA)
  annotations: {}
  # automountServiceAccountToken determines if the service account token should be automatically mounted
  automountServiceAccountToken: true

# salesforce contains a reference to a pre-existing Kubernetes Secret holding
# Salesforce credentials. Create the secret out-of-band (e.g. via ESO, Sealed
# Secrets, or kubectl) before deploying this chart. The chart does not create or
# manage the secret itself.
salesforce:
  secrets:
    # name is the name of the Kubernetes Secret containing Salesforce credentials.
    name: lfx-v2-member-service-salesforce
    # keys maps each credential to the key name used inside the Secret.
    keys:
      instanceURL: instance_url
      clientID: client_id
      clientSecret: client_secret
      username: username
      password: password
      securityToken: security_token
      consumerRSAPem: consumer_rsa_pem
