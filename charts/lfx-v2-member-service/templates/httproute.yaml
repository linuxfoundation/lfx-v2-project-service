---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lfx-v2-member-service
  namespace: {{ .Values.lfx.namespace }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.traefik.gateway.name }}
    namespace: {{ .Values.traefik.gateway.namespace }}
  hostnames:
  - "lfx-api.{{ .Values.lfx.domain }}"
  rules:
  # Project-scoped tier endpoints (with authentication)
  # Matches: /projects/{uid}/tiers, /projects/{uid}/tiers/{tier_uid}
  - matches:
    - path:
        type: RegularExpression
        value: /projects/[^/]+/tiers(/.*)?
    {{- if .Values.heimdall.enabled }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: heimdall-forward-body
    {{- end }}
    backendRefs:
    - group: ""
      kind: Service
      name: lfx-v2-member-service
      port: {{ .Values.service.port }}
      weight: 1
  # Project-scoped membership endpoints (with authentication)
  # Matches: /projects/{uid}/memberships, /projects/{uid}/memberships/{membership_uid},
  #          /projects/{uid}/memberships/{membership_uid}/key_contacts, etc.
  - matches:
    - path:
        type: RegularExpression
        value: /projects/[^/]+/memberships(/.*)?
    {{- if .Values.heimdall.enabled }}
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: heimdall-forward-body
    {{- end }}
    backendRefs:
    - group: ""
      kind: Service
      name: lfx-v2-member-service
      port: {{ .Values.service.port }}
      weight: 1
  # OpenAPI spec endpoints (no authentication required)
  - matches:
    - path:
        type: PathPrefix
        value: /_memberships/
    backendRefs:
    - group: ""
      kind: Service
      name: lfx-v2-member-service
      port: {{ .Values.service.port }}
      weight: 1
