---
{{- if .Values.consumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-consumer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}-consumer
spec:
  # replicas must stay 1 — CDC replay-ID cursor is not sharded.
  replicas: {{ .Values.consumer.replicaCount }}
  strategy:
    # Recreate terminates the old pod before starting a new one, guaranteeing
    # at most one active CDC consumer at any point in time (no app-level lease).
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-consumer
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-consumer
        app.kubernetes.io/name: {{ .Chart.Name }}-consumer
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          securityContext:
            allowPrivilegeEscalation: false
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RUN_MODE
              value: "consumer"
            - name: NATS_URL
              value: {{ .Values.nats.url }}
            - name: LOG_LEVEL
              value: {{ .Values.app.logLevel }}
            - name: LOG_ADD_SOURCE
              value: {{ .Values.app.logAddSource | quote }}
            - name: GLOBAL_ORG_ADMIN_TEAM_UID
              value: {{ .Values.app.globalOrgAdminTeamUID | quote }}
            - name: SF_PUBSUB_ENDPOINT
              value: {{ .Values.consumer.pubsubEndpoint | quote }}
            - name: SF_CDC_CHANNEL
              value: {{ .Values.consumer.cdcChannel | quote }}
            - name: SF_ORG_ID
              value: {{ .Values.consumer.orgID | quote }}
            - name: SF_INSTANCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.instanceURL }}
            - name: SF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.clientID }}
            - name: SF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.clientSecret }}
            - name: SF_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.username }}
            - name: SF_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.password }}
            - name: SF_SECURITY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.securityToken }}
                  optional: true
            - name: SF_CONSUMER_RSA_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.salesforce.secrets.name }}
                  key: {{ .Values.salesforce.secrets.keys.consumerRSAPem }}
                  optional: true
            {{- with .Values.consumer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- $otelServiceName := .Values.app.otel.serviceName | toString | trim }}
            {{- if ne $otelServiceName "" }}
            - name: OTEL_SERVICE_NAME
              value: {{ $otelServiceName | quote }}
            {{- end }}
            {{- $otelServiceVersion := .Values.app.otel.serviceVersion | toString | trim }}
            {{- if ne $otelServiceVersion "" }}
            - name: OTEL_SERVICE_VERSION
              value: {{ $otelServiceVersion | quote }}
            {{- end }}
            {{- $otelEndpoint := .Values.app.otel.endpoint | toString | trim }}
            {{- if ne $otelEndpoint "" }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $otelEndpoint | quote }}
            {{- end }}
            {{- $otelProtocol := .Values.app.otel.protocol | toString | trim }}
            {{- if ne $otelProtocol "" }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ $otelProtocol | quote }}
            {{- end }}
            {{- $otelInsecure := .Values.app.otel.insecure | toString | trim }}
            {{- if ne $otelInsecure "" }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: {{ $otelInsecure | quote }}
            {{- end }}
            {{- $otelTracesExporter := .Values.app.otel.tracesExporter | toString | trim }}
            {{- if ne $otelTracesExporter "" }}
            - name: OTEL_TRACES_EXPORTER
              value: {{ $otelTracesExporter | quote }}
            {{- end }}
            {{- $otelTracesSampleRatio := .Values.app.otel.tracesSampleRatio | toString | trim }}
            {{- if ne $otelTracesSampleRatio "" }}
            - name: OTEL_TRACES_SAMPLE_RATIO
              value: {{ $otelTracesSampleRatio | quote }}
            {{- end }}
            {{- $otelMetricsExporter := .Values.app.otel.metricsExporter | toString | trim }}
            {{- if ne $otelMetricsExporter "" }}
            - name: OTEL_METRICS_EXPORTER
              value: {{ $otelMetricsExporter | quote }}
            {{- end }}
            {{- $otelLogsExporter := .Values.app.otel.logsExporter | toString | trim }}
            {{- if ne $otelLogsExporter "" }}
            - name: OTEL_LOGS_EXPORTER
              value: {{ $otelLogsExporter | quote }}
            {{- end }}
            {{- $otelPropagators := .Values.app.otel.propagators | toString | trim }}
            {{- if ne $otelPropagators "" }}
            - name: OTEL_PROPAGATORS
              value: {{ $otelPropagators | quote }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: web
          # Liveness probe hits the same /livez endpoint served by the consumer's
          # minimal health server on the same port as the API. A hung gRPC stream
          # or a pod that exited Run unexpectedly will fail this probe and trigger
          # a pod restart without waiting for a human to notice.
          livenessProbe:
            httpGet:
              path: /livez
              port: web
            failureThreshold: 3
            periodSeconds: 15
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.consumer.resources | nindent 12 }}
{{- end }}
