  {{- end }}
spec:
  bucket: {{ .Values.nats.kv_bucket_membership_contacts.name }}
  history: {{ .Values.nats.kv_bucket_membership_contacts.history }}
  storage: {{ .Values.nats.kv_bucket_membership_contacts.storage }}
  maxValueSize: {{ .Values.nats.kv_bucket_membership_contacts.maxValueSize }}
  maxBytes: {{ .Values.nats.kv_bucket_membership_contacts.maxBytes }}
  compression: {{ .Values.nats.kv_bucket_membership_contacts.compression }}
{{- end }}
---
{{- if .Values.nats.kv_bucket_members.creation }}
apiVersion: jetstream.nats.io/v1beta2
kind: KeyValue
