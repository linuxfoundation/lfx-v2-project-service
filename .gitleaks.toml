title = "gitleaks config"

[extend]
# useDefault will extend the base configuration with the default gitleaks config
useDefault = true

[allowlist]
    description = "Allowlisted files"
    paths = [
        # Exclude test files as they often contain dummy/fake data
        '''.*_test\.go$''',
        '''(go.mod|go.sum)$''',
        # Exclude Goa-generated Go source only (deterministic codegen, no real
        # secrets; method-assignment lines false-positive the vault-service-token
        # rule). Generated JSON/YAML specs under gen/ stay scanned.
        '''^gen/.*\.go$'''
    ]
