components:
    schemas:
        B2bOrgResponse:
            type: object
            properties:
                created_at:
                    type: string
                    description: Creation timestamp
                    example: "2025-01-01T00:00:00Z"
                    format: date-time
                domain:
                    type: string
                    description: Organization website domain
                    example: https://example.com
                logo_url:
                    type: string
                    description: URL of the organization logo
                    example: https://example.com/logo.png
                name:
                    type: string
                    description: Organization name
                    example: Example Corp
                uid:
                    type: string
                    description: B2BOrg UID (invertible UUID v8 from Account.Id)
                    example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                    format: uuid
                updated_at:
                    type: string
                    description: Last update timestamp
                    example: "2025-06-01T12:00:00Z"
                    format: date-time
