definitions:
    AdminReindexItem:
        title: AdminReindexItem
        type: object
        properties:
            type:
                type: string
                description: 'Entity type: b2b_org, project_membership, or key_contact'
                example: b2b_org
            uid:
                type: string
                description: Entity UID (invertible UUID v8)
                example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
        description: A single entity to reindex (targeted mode)
        example:
            type: b2b_org
            uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
        required:
            - type
            - uid
    B2bOrgResponse:
        title: B2bOrgResponse
        type: object
        properties:
            created_at:
                type: string
                description: Creation timestamp
                example: "2025-01-01T00:00:00Z"
                format: date-time
            crunch_base_url:
                type: string
                description: CrunchBase profile URL (Account.CrunchBase_URL__c)
                example: https://www.crunchbase.com/organization/example-corp
            description:
                type: string
                description: Organization free-text description (Account.Description)
                example: A leading technology company
            domain_aliases:
                type: array
                items:
                    type: string
                    example: Dolorem cupiditate delectus facilis praesentium est veniam.
                description: Additional domains; each item is a bare host with the same normalization as primary_domain
                example:
                    - example.org
                    - example.net
            industry:
                type: string
                description: Industry classification (Account.Industry, standard Salesforce field)
                example: Technology
            is_member:
                type: boolean
                description: Whether the organization is currently an LF member (Account.IsMember__c); read-only, managed by Salesforce workflows
                example: true
            logo_url:
                type: string
                description: URL of the organization logo (Account.Logo_URL__c)
                example: https://example.com/logo.png
            name:
                type: string
                description: Organization name
                example: Example Corp
            number_of_employees:
                type: integer
                description: Employee count (Account.NumberOfEmployees)
                example: 500
                format: int64
            parent_uid:
                type: string
                description: UID of the parent organization (Account.ParentId); omitted when no parent
                example: 5c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
            phone:
                type: string
                description: Organization contact phone number (Account.Phone)
                example: +1-555-000-0000
            primary_domain:
                type: string
                description: Primary domain; bare host only, no scheme or path, e.g. 'example.com'
                example: example.com
            sector:
                type: string
