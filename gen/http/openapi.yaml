                type: string
                description: Timestamp when the project was added
                example: "2026-01-01T00:00:00Z"
                format: date-time
            created_by:
                type: string
                description: LFID username of the principal who added this project
                example: alice
            project_name:
                type: string
                description: Project display name (snapshot)
                example: My Project
            project_sfid:
                type: string
                description: Salesforce Project__c.Id (snapshot)
                example: a2F000000000001AAA
            project_slug:
                type: string
                description: Project URL slug (snapshot)
                example: my-project
            project_uid:
                type: string
                description: v2 project UID
                example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
            updated_at:
                type: string
                description: Timestamp when this association was last updated
                example: "2026-01-01T00:00:00Z"
                format: date-time
            updated_by:
                type: string
                description: LFID username of the principal who last updated this association
                example: alice
