    MembershipServiceAdminReindexRequestBody:
        title: MembershipServiceAdminReindexRequestBody
        type: object
        properties:
            dry_run:
                type: boolean
                description: When true, walk SOQL/live-path but skip publishing. Final log includes would_publish_count.
                default: false
                example: false
            items:
                type: array
                items:
                    $ref: '#/definitions/AdminReindexItem'
                description: Targeted list of entities to reindex (surgical mode). Mutually exclusive with types and since. Max 100 items.
                example:
                    - type: b2b_org
                      uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                    - type: b2b_org
                      uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                    - type: b2b_org
                      uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                maxItems: 100
            since:
                type: string
                description: ISO 8601 / RFC 3339 timestamp with explicit zone; only records with LastModifiedDate >= since are reindexed. Mutually exclusive with items. Handler normalises to UTC.
                example: "2026-05-20T00:00:00Z"
                format: date-time
            types:
                type: array
                items:
                    type: string
                    example: Mollitia velit.
                description: 'Entity types to reindex (optional; default = all in-scope: b2b_org, project_membership, key_contact). Mutually exclusive with items.'
                example:
                    - b2b_org
                    - project_membership
        example:
            dry_run: true
            items:
                - type: b2b_org
                  uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                - type: b2b_org
                  uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                - type: b2b_org
                  uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
            since: "2026-05-20T00:00:00Z"
            types:
                - b2b_org
                - project_membership
