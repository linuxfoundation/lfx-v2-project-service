    MembershipServiceCreateKeyContactRequestBody:
        title: MembershipServiceCreateKeyContactRequestBody
        type: object
        properties:
            board_member:
                type: boolean
                description: Whether this contact holds a board member role
                example: false
            email:
                type: string
                description: Contact email address; used to resolve or create the Salesforce Contact record
                example: john.doe@example.com
                format: email
            first_name:
                type: string
                description: Contact first name; used when creating a new Contact on miss
                example: John
            last_name:
                type: string
                description: Contact last name; used when creating a new Contact on miss
                example: Doe
            primary_contact:
                type: boolean
                description: Whether this is the primary contact for the membership
                example: false
            role:
                type: string
                description: Contact role designation
                example: Technical Contact
                enum:
                    - Representative/Voting Contact
                    - Authorized Signatory
                    - Billing Contact
                    - Marketing Contact
                    - Technical Contact
                    - Legal Contact
                    - Event Sponsorship Contact
                    - PO Contact
                    - PR Contact
            send_invite:
                type: boolean
                description: When true, send a platform invite (unregistered user) or role-assignment email (registered user). Defaults to false — org-dashboard access is still provisioned silently for registered users.
                default: false
                example: false
            status:
                type: string
                description: Role record status, e.g. 'Active'
                example: Active
                enum:
                    - Active
                    - Inactive
            title:
                type: string
                description: Contact job title. Only persisted when a new Salesforce Contact is created (email resolves to an unknown address); ignored if the Contact already exists.
                example: CTO
        example:
            board_member: false
            email: john.doe@example.com
            first_name: John
            last_name: Doe
            primary_contact: false
            role: Technical Contact
            send_invite: false
            status: Active
            title: CTO
        required:
            - email
            - first_name
            - last_name
            - role
