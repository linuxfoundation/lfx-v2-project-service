    MembershipServiceUpdateKeyContactRequestBody:
        title: MembershipServiceUpdateKeyContactRequestBody
        type: object
        properties:
            board_member:
                type: boolean
                description: Whether this contact holds a board member role
                example: false
            email:
                type: string
                description: Contact email address; normalized to lowercase before update
                example: john.doe@example.com
                format: email
            primary_contact:
                type: boolean
                description: Whether this is the primary contact for the membership
                example: false
            role:
                type: string
                description: Contact role designation
                example: Technical Contact
                enum:
                    - Representative/Voting Contact
                    - Authorized Signatory
                    - Billing Contact
                    - Marketing Contact
                    - Technical Contact
                    - Legal Contact
                    - Event Sponsorship Contact
                    - PO Contact
                    - PR Contact
            send_invite:
                type: boolean
                description: When true, send a platform invite (unregistered user) or role-assignment email (registered user) if the email changes. Defaults to false — org-dashboard access is still provisioned silently for registered users.
                default: false
                example: true
            status:
                type: string
                description: Role record status, e.g. 'Active'
                example: Active
                enum:
                    - Active
                    - Inactive
            title:
                type: string
                description: Contact job title. Only persisted when the email change resolves to an unknown address and a new Salesforce Contact is created; ignored if the Contact already exists.
                example: CTO
        example:
            board_member: false
            email: john.doe@example.com
            primary_contact: false
            role: Technical Contact
            send_invite: false
            status: Active
            title: CTO
