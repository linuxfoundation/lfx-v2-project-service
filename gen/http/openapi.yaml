        required:
            - email
            - invited_as
    ProjectKeyContactResponse:
        title: ProjectKeyContactResponse
        type: object
        properties:
            b2b_org_uid:
                type: string
                description: UID of the B2B organization (Account) this key contact's membership belongs to
                example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
            board_member:
                type: boolean
                description: Whether this contact holds a board member role
                example: false
            company_domain:
                type: string
                description: Member company website/domain (denormalized from Asset.Account.Website)
                example: https://example.com
            company_logo_url:
                type: string
                description: Member company logo URL (denormalized from Asset.Account)
                example: https://example.com/logo.png
            company_name:
                type: string
                description: Member company name (denormalized from Asset.Account)
                example: Example Corp
            created_at:
                type: string
                description: Creation timestamp
                example: "2025-01-01T00:00:00Z"
                format: date-time
            email:
                type: string
                description: Primary email address from Alternate_Email__c where Primary_Email__c = true
                example: john.doe@example.com
            first_name:
                type: string
                description: Contact first name (denormalized from Contact)
                example: John
            last_name:
                type: string
                description: Contact last name (denormalized from Contact)
                example: Doe
            membership_uid:
                type: string
                description: UID of the associated membership (Asset)
                example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
            primary_contact:
                type: boolean
                description: Whether this is the primary contact for the membership
                example: true
            project_uid:
                type: string
                description: V2 project UUID
                example: a27394a3-7a6c-4d0f-9e0f-692d8753924f
                format: uuid
            role:
                type: string
                description: Contact role designation
                example: Technical Contact
            status:
                type: string
                description: Role record status
                example: Active
            tier_uid:
                type: string
                description: UID of the associated membership tier (Product2)
                example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
            title:
                type: string
                description: Contact job title (denormalized from Contact)
                example: CTO
            uid:
                type: string
                description: Key contact UID (invertible UUID v8 from Project_Role__c.Id)
                example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
            updated_at:
                type: string
                description: Last update timestamp
                example: "2025-06-01T12:00:00Z"
                format: date-time
        description: A key contact (Project_Role__c) scoped to a membership, with denormalized contact and company attributes
        example:
            b2b_org_uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
            board_member: false
            company_domain: https://example.com
            company_logo_url: https://example.com/logo.png
            company_name: Example Corp
            created_at: "2025-01-01T00:00:00Z"
            email: john.doe@example.com
            first_name: John
            last_name: Doe
            membership_uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
