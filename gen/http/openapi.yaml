    WorkspaceResponse:
        title: WorkspaceResponse
        type: object
        properties:
            created_at:
                type: string
                description: Creation timestamp
                example: "2026-01-01T00:00:00Z"
                format: date-time
            created_by:
                type: string
                description: LFID username of the creator
                example: alice
            name:
                type: string
                description: Workspace display name
                example: My Workspace
            projects:
                type: array
                items:
                    $ref: '#/definitions/WorkspaceProjectResponse'
                description: Project associations in this workspace
                example:
                    - created_at: "2026-01-01T00:00:00Z"
                      created_by: alice
                      project_name: My Project
                      project_sfid: a2F000000000001AAA
                      project_slug: my-project
                      project_uid: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      updated_at: "2026-01-01T00:00:00Z"
                      updated_by: alice
                    - created_at: "2026-01-01T00:00:00Z"
                      created_by: alice
                      project_name: My Project
                      project_sfid: a2F000000000001AAA
                      project_slug: my-project
                      project_uid: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                      updated_at: "2026-01-01T00:00:00Z"
                      updated_by: alice
            uid:
                type: string
                description: Workspace UID
                example: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
                format: uuid
            updated_at:
                type: string
                description: Last-update timestamp
                example: "2026-06-01T12:00:00Z"
                format: date-time
            updated_by:
                type: string
                description: LFID username of the last updater
                example: alice
        description: A named container of project associations within a b2b_org
        example:
            created_at: "2026-01-01T00:00:00Z"
            created_by: alice
            name: My Workspace
            projects:
                - created_at: "2026-01-01T00:00:00Z"
                  created_by: alice
                  project_name: My Project
                  project_sfid: a2F000000000001AAA
                  project_slug: my-project
                  project_uid: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  updated_at: "2026-01-01T00:00:00Z"
                  updated_by: alice
                - created_at: "2026-01-01T00:00:00Z"
                  created_by: alice
                  project_name: My Project
                  project_sfid: a2F000000000001AAA
                  project_slug: my-project
                  project_uid: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  updated_at: "2026-01-01T00:00:00Z"
                  updated_by: alice
            uid: 4c46585f-9f01-8bda-a0a5-f0c8eeef7fff
            updated_at: "2026-06-01T12:00:00Z"
            updated_by: alice
        required:
            - uid
            - name
