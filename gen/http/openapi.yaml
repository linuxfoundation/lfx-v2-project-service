    MembershipServiceAdminReindexRequestBody:
        title: MembershipServiceAdminReindexRequestBody
        type: object
        properties:
            dry_run:
                type: boolean
                description: When true, walk SOQL/live-path but skip publishing. Final log includes would_publish_count.
                default: false
                example: false
            items:
                type: array
                items:
                    $ref: '#/definitions/AdminReindexItem'
                description: Targeted list of entities to reindex (surgical mode). Mutually exclusive with types and since. Max 100 items.
                example:
                    - type: b2b_org
                      uid: 001B000000IqhSLIAZ
                    - type: b2b_org
                      uid: 001B000000IqhSLIAZ
                    - type: b2b_org
                      uid: 001B000000IqhSLIAZ
                maxItems: 100
            since:
                type: string
                description: ISO 8601 / RFC 3339 timestamp with explicit zone; only records with LastModifiedDate >= since are reindexed. Mutually exclusive with items. Handler normalises to UTC. For key_contact (high-volume), prefer a ~2-year window (e.g. 2024-06-01T00:00:00Z) to sync only the active set instead of the full ~300k records.
                example: "2026-05-20T00:00:00Z"
                format: date-time
            types:
                type: array
                items:
                    type: string
                    example: Et quasi sed ea est ipsa.
                description: 'Entity types to reindex (optional; default = all in-scope: b2b_org, project_membership, key_contact, b2b_org_settings). Mutually exclusive with items.'
                example:
                    - b2b_org
                    - project_membership
        example:
            dry_run: true
            items:
                - type: b2b_org
                  uid: 001B000000IqhSLIAZ
                - type: b2b_org
                  uid: 001B000000IqhSLIAZ
                - type: b2b_org
                  uid: 001B000000IqhSLIAZ
            since: "2026-05-20T00:00:00Z"
            types:
                - b2b_org
                - project_membership
