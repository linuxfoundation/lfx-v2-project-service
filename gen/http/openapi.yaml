definitions:
    AdminReindexItem:
        title: AdminReindexItem
        type: object
        properties:
            type:
                type: string
                description: 'Entity type: b2b_org, project_membership, key_contact, or b2b_org_settings'
                example: b2b_org
            uid:
                type: string
                description: Entity UID (Salesforce ID)
                example: 001B000000IqhSLIAZ
        description: A single entity to reindex (targeted mode)
        example:
            type: b2b_org
            uid: 001B000000IqhSLIAZ
        required:
            - type
            - uid
    B2bOrgResponse:
        title: B2bOrgResponse
        type: object
        properties:
            created_at:
                type: string
                description: Creation timestamp
                example: "2025-01-01T00:00:00Z"
                format: date-time
            crunch_base_url:
                type: string
                description: CrunchBase profile URL (Account.CrunchBase_URL__c)
                example: https://www.crunchbase.com/organization/example-corp
            description:
                type: string
                description: Organization free-text description (Account.Description)
                example: A leading technology company
            domain_aliases:
                type: array
                items:
                    type: string
                    example: Incidunt enim.
                description: Additional domains; each item is a bare host with the same normalization as primary_domain
                example:
                    - example.org
                    - example.net
            industry:
                type: string
                description: Industry classification (Account.Industry, standard Salesforce field)
                example: Technology
            is_member:
                type: boolean
                description: Whether the organization is currently an LF member (Account.IsMember__c); read-only, managed by Salesforce workflows
                example: true
            logo_url:
                type: string
                description: URL of the organization logo (Account.Logo_URL__c)
                example: https://example.com/logo.png
            name:
                type: string
                description: Organization name
                example: Example Corp
            number_of_employees:
                type: integer
                description: Employee count (Account.NumberOfEmployees)
                example: 500
                format: int64
            parent_uid:
                type: string
                description: UID of the parent organization (Account.ParentId); omitted when no parent
                example: 001B000000IqhSLIAZ
            phone:
                type: string
                description: Organization contact phone number (Account.Phone)
                example: +1-555-000-0000
            primary_domain:
                type: string
                description: Primary domain; bare host only, no scheme or path, e.g. 'example.com'
                example: example.com
            sector:
                type: string
                description: Sector classification (Account.Sector__c, custom Salesforce field)
                example: Software
            slug:
                type: string
                description: URL-friendly organization identifier; populated when Account.Slug__c is available
                example: example-corp
            status:
                type: string
                description: LF membership status (Account.LF_Membership_Status__c); read-only, managed by Salesforce workflows
                example: Active
            uid:
                type: string
                description: B2BOrg UID (Salesforce Account.Id)
                example: 001B000000IqhSLIAZ
            updated_at:
                type: string
                description: Last update timestamp
                example: "2025-06-01T12:00:00Z"
                format: date-time
            website:
                type: string
                description: Organization website URL; always has a scheme (http or https)
                example: https://example.com
                format: uri
        description: A B2B organization
        example:
            created_at: "2025-01-01T00:00:00Z"
            crunch_base_url: https://www.crunchbase.com/organization/example-corp
            description: A leading technology company
            domain_aliases:
                - example.org
                - example.net
            industry: Technology
            is_member: true
            logo_url: https://example.com/logo.png
            name: Example Corp
            number_of_employees: 500
            parent_uid: 001B000000IqhSLIAZ
            phone: +1-555-000-0000
            primary_domain: example.com
            sector: Software
            slug: example-corp
            status: Active
            uid: 001B000000IqhSLIAZ
            updated_at: "2025-06-01T12:00:00Z"
            website: https://example.com
    B2bOrgSettingsResponse:
        title: B2bOrgSettingsResponse
        type: object
        properties:
            auditors:
                type: array
                items:
                    $ref: '#/definitions/OrgUser'
                description: Read-only principals (auditor relation in FGA). Full-replace on PUT.
                example:
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
                      invite_status: accepted
                      invited_as: writer
                      name: Alice Smith
                      username: alice
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
                      invite_status: accepted
                      invited_as: writer
                      name: Alice Smith
                      username: alice
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
                      invite_status: accepted
                      invited_as: writer
                      name: Alice Smith
                      username: alice
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
                      invite_status: accepted
                      invited_as: writer
                      name: Alice Smith
                      username: alice
            created_at:
                type: string
                description: Settings record creation timestamp
                example: "2025-01-01T00:00:00Z"
                format: date-time
            updated_at:
                type: string
                description: Settings record last-update timestamp
                example: "2025-06-01T12:00:00Z"
                format: date-time
            writers:
                type: array
                items:
                    $ref: '#/definitions/OrgUser'
                description: Org administrators (writer relation in FGA). Full-replace on PUT.
                example:
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
                      invite_status: accepted
                      invited_as: writer
                      name: Alice Smith
                      username: alice
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
                      invite_status: accepted
                      invited_as: writer
                      name: Alice Smith
                      username: alice
                    - avatar: https://avatars.githubusercontent.com/u/12345
                      email: alice@example.com
